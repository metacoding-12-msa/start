apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-deploy
  namespace: metacoding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator-server
          image: metacoding/orchestrator:2
          envFrom:
            - configMapRef:
                name: orchestrator-configmap

