apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-deploy
  namespace: metacoding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            # 클러스터를 구분하는 고유 식별자
            - name: CLUSTER_ID
              value: "AbijZYk0QOm5p852kOMSIg"
            # 클러스터 안에서 이 서버를 구분하는 번호
            - name: KAFKA_NODE_ID
              value: "1"
            # 한 컨테이너가 브로커와 컨트롤러 역할을 겸하도록 지정
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            # Kafka가 수신 대기할 주소·포트 (9092 클라이언트용, 9093 컨트롤러용)
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            # 브로커끼리 통신할 때 쓰는 리스너 이름
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # 컨트롤러 통신에 쓰는 리스너 이름
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            # 클라이언트가 접근할 주소 (ConfigMap의 SPRING_KAFKA_BOOTSTRAP_SERVERS와 같아야 함)
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-service:9092"
            # 컨트롤러 역할을 맡는 서버 목록 (노드ID@호스트:포트)
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            # 오프셋 저장 토픽의 복제 수 (단일 노드라 1)
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
